services:
  postgres:
    image: postgres:15-alpine
    container_name: miganaderia-postgres
    environment:
      POSTGRES_DB: miganaderia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - miganaderia-network

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: miganaderia-backend
    environment:
      NODE_ENV: development
      PORT: 5000
      SUPABASE_URL: http://supabase:3000
      SUPABASE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
      JWT_SECRET: your_jwt_secret_key_change_this_in_production
      CORS_ORIGIN: http://localhost:5173
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: miganaderia
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - ./docker/init.sql:/app/docker/init.sql:ro
      - backend_node_modules:/app/node_modules
    networks:
      - miganaderia-network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: miganaderia-frontend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      PORT: 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - miganaderia-network
    command: npm run dev -- --host 0.0.0.0

networks:
  miganaderia-network:
    driver: bridge

volumes:
  postgres_data:
  backend_node_modules:
